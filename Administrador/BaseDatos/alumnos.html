<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Alumnos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }

    .card-custom {
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .table th {
      font-weight: 600;
    }

    .btn-sm {
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">

    <!-- LOGO + TEXTO -->
    <a class="navbar-brand d-flex align-items-center" href="#">
      <img src="https://i.imgur.com/tQZrj5T.png" alt="Logo" width="40" height="40" class="me-2">
      SEAD Sistema Estudiantil de Asistencia Digital
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto align-items-center">

        <li class="nav-item">
          <a class="nav-link" href="../dashboard.html">Dashboard</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="alumnos.html">Base de datos</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="../Usuarios/usuarios.html">Usuarios</a>
        </li>

        <!-- BOTÓN CERRAR SESIÓN -->
        <li class="nav-item ms-lg-3">
          <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">
            Cerrar sesión
          </button>
        </li>

      </ul>
    </div>
  </div>
</nav>

  <!-- 📦 CONTENIDO -->
  <div class="container mt-4">

    <div class="card card-custom p-4">

      <!-- HEADER -->
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">

        <!-- Título -->
        <h4 class="mb-0">Gestión de Alumnos</h4>

        <!-- Controles -->
        <div class="d-flex flex-column flex-sm-row gap-2 align-items-stretch align-items-sm-end">

          <div>
            <label class="form-label mb-1">Filtrar por sección</label>
            <select id="filtroSeccion" class="form-select">
              <option value="">Todas</option>
            </select>
          </div>

          <button class="btn btn-primary" onclick="abrirModal()">
            + Nuevo Alumno
          </button>

        </div>

      </div>

      <!-- TABLA -->
      <div class="table-responsive">
        <table class="table table-hover align-middle" id="tabla">
          <thead class="table-light">
            <tr>
              <th>NIE</th>
              <th>Apellido</th>
              <th>Nombre</th>
              <th>Sección</th>
              <th>Correo</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaAlumnos"></tbody>
        </table>
      </div>

    </div>

  </div>

  <!-- 🪟 MODAL -->
  <div class="modal fade" id="modalAlumno">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow">

        <div class="modal-header">
          <h5 class="modal-title">Alumno</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <input type="hidden" id="id">

          <!-- NIE -->
          <div class="mb-3">
            <label class="form-label">NIE</label>
            <input class="form-control" id="nie" required>
            <div class="invalid-feedback">El NIE es obligatorio</div>
          </div>

          <!-- Nombre -->
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input class="form-control" id="nombre" required>
            <div class="invalid-feedback">El nombre es obligatorio</div>
          </div>

          <!-- Apellido -->
          <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input class="form-control" id="apellido" required>
            <div class="invalid-feedback">El apellido es obligatorio</div>
          </div>

          <!-- Sección -->
          <div class="mb-3">
            <label class="form-label">Sección</label>
            <select id="seccion" class="form-select" required>
              <option value="">Seleccione una sección</option>
            </select>
            <div class="invalid-feedback">La sección es obligatoria</div>
          </div>

          <!-- Correo -->
          <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" class="form-control" id="correo" placeholder="ejemplo@correo.com">
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" onclick="guardarAlumno()">Guardar</button>
        </div>

      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- DataTables -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../api.js"></script>
  <script src="../../loading.js"></script>
  <script src="alumnos.js"></script>

</body>

</html>
