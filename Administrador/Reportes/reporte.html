<!DOCTYPE html>

<head>

    <style>
        body {
            background: #f4f6f9;
        }

        .card-custom {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .table th {
            font-weight: 600;
        }

        .btn-sm {
            border-radius: 8px;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">

            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="https://i.imgur.com/tQZrj5T.png" alt="Logo" width="40" height="40" class="me-2">
                <span class="d-none d-md-inline">
                    SEAD Sistema Estudiantil de Asistencia Digital
                </span>
                <span class="d-inline d-md-none">
                    SEAD
                </span>
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto align-items-center">

                    <li class="nav-item">
                        <a class="nav-link" href="../dashboard.html">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="../BaseDatos/alumnos.html">Base de datos</a>

                    <li class="nav-item">

                    </li>

                    <!-- BOTÓN CERRAR SESIÓN -->
                    <li class="nav-item ms-lg-3">
                        <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">
                            Cerrar sesión
                        </button>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- 📦 CONTENIDO -->
    <div class="container mt-4">

        <div class="row">
            <div class="col-12">
                <div class="card card-custom p-4">

                    <!-- HEADER -->
                    <div
                        class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">

                        <!-- Título -->
                        <h4 class="mb-0">Reporte</h4>

                        <!-- Controles -->
                        <div class="row g-2 align-items-end justify-content-end w-100">

                            <div class="col-12 col-sm-6 col-md-2">
                                <label class="form-label">Desde</label>
                                <input type="date" id="fechaInicio" class="form-control">
                            </div>

                            <div class="col-12 col-sm-6 col-md-2">
                                <label class="form-label">Hasta</label>
                                <input type="date" id="fechaFin" class="form-control">
                            </div>

                            <div class="col-12 col-sm-6 col-md-3">
                                <label class="form-label">Sección</label>
                                <select id="seccion" class="form-select">
                                </select>
                            </div>

                            <div class="col-12 col-sm-6 col-md-2">
                                <button class="btn btn-primary w-100" onclick="obtenerAsistencias()">
                                    Buscar
                                </button>
                            </div>

                            <div class="col-12 col-sm-6 col-md-2">
                            
                                <button class="btn btn-success dropdown-toggle w-100" data-bs-toggle="dropdown">
                                    Exportar
                                </button>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="#" onclick="exportarExcel()">Excel</a></li>
                                    <li><a class="dropdown-item" href="#" onclick="exportarPDF()">PDF</a></li>
                                </ul>
                            </div>

                        </div>

                    </div>

                    <h4 class="mb-3" id="lbSeccion">Resultados</h4>

                    <!-- TABLA -->
                    <div class="table-responsive">
                        <table class="table table-hover align-middle" id="tabla">
                            <thead class="table-light" id="tablaReporteHead">
                            </thead>
                            <tbody id="tablaReporte"></tbody>
                        </table>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <!-- SCRIPTS -->
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
