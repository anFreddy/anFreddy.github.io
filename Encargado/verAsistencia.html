<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ver Asistencia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            min-height: 100vh;
        }
        .card {
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <!-- INFO ALUMNO -->
    <div class="card shadow-lg p-4 mb-4">
        <h5>Alumno seleccionado</h5>
        <p id="infoAlumno"></p>
    </div>

    <!-- FILTRO FECHAS -->
    <div class="card shadow-lg p-4 mb-4">
        <h5>Selecciona un rango de fechas</h5>

        <div class="row">
            <div class="col-md-5">
                <label>Desde</label>
                <input type="date" id="fechaInicio" class="form-control">
            </div>

            <div class="col-md-5">
                <label>Hasta</label>
                <input type="date" id="fechaFin" class="form-control">
            </div>

            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-primary w-100" onclick="buscarAsistencia()">Buscar</button>
            </div>
        </div>
    </div>

    <!-- TABLA -->
    <div class="card shadow-lg p-4 mb-4">
        <h5>Asistencia</h5>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Detalle</th>
                </tr>
            </thead>
            <tbody id="tablaAsistencia"></tbody>
        </table>
    </div>

    <button class="btn btn-secondary" onclick="volver()">⬅ Volver</button>

</div>

<script src="../api.js"></script>   <!-- PRIMERO -->
<script src="verAsistencia.js"></script> <!-- DESPUÉS -->

</body>
</html>
