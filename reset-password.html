<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecer contraseña</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #ffffff, #eceae5);
            height: 100vh;
        }
        .card {
            border-radius: 20px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg p-4">
                <h4 class="text-center mb-3">Nueva contraseña 🔐</h4>

                <form id="resetForm">
                    <div class="mb-3">
                        <label>Nueva contraseña</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Confirmar contraseña</label>
                        <input type="password" id="confirmPassword" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        Actualizar contraseña
                    </button>
                </form>

                <div id="mensaje" class="text-center mt-3"></div>
            </div>

        </div>
    </div>
</div>

<script src="api.js"></script>

<script>
document.getElementById("resetForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const mensaje = document.getElementById("mensaje");

    if (password !== confirmPassword) {
        mensaje.innerHTML = "<span class='text-danger'>Las contraseñas no coinciden</span>";
        return;
    }

    try {
        await apiFetch("auth/reset-password", {
            method: "POST",
            body: JSON.stringify({
                token,
                password
            })
        });

        mensaje.innerHTML = "<span class='text-success'>Contraseña actualizada 🎉</span>";

        setTimeout(() => {
            window.location.href = "index.html";
        }, 2000);

    } catch (error) {
        mensaje.innerHTML = "<span class='text-danger'>" + error.message + "</span>";
    }
});
</script>

</body>
</html>
